server:
  port: 8081
spring:
  application:
    name: portfolio-service
#  datasource:
#    url: jdbc:mysql://database-1.c7me8euy81hb.eu-north-1.rds.amazonaws.com:3306/finadvdb
#    username: admin
#    password: Sandy*994
#    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    database-platform: org.hibernate.dialect.MySQLDialect
    hibernate:
      ddl-auto: update

  flyway:
    enabled: true
    locations: classpath:db/migration

  kafka:
      bootstrap-servers: localhost:9092

      producer:
        acks: all
        retries: 3
        key-serializer: org.apache.kafka.common.serialization.StringSerializer
        value-serializer: org.springframework.kafka.support.serializer.JsonSerializer

        properties:
          enable.idempotence: true
          max.in.flight.requests.per.connection: 5

      consumer:
        group-id: portfolio-group
        auto-offset-reset: earliest
        enable-auto-commit: false

        key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
        value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer

        properties:
          spring.json.trusted.packages: "*"

      listener:
        ack-mode: manual_immediate

  management:
    endpoints:
      web:
        exposure:
          include: health,info,metrics,prometheus

  logging:
    level:
      org.springframework.kafka: INFO
      com.fa.portfolio: DEBUG

  app:
    kafka:
      topics:
        trade-request: trade-requests
        trade-executed: trade-executed
        trade-failed: trade-failed

aws:
  s3:
    document-bucket: advisor-client-documents
    preview-bucket: advisor-document-previews

management:
  endpoints:
    web:
      exposure:
        include:
          - health
          - info
          - prometheus

  endpoint:
    prometheus:
      enabled: true

  metrics:
    tags:
      application: portfolio-service